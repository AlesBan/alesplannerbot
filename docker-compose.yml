version: "3.9"

services:
  bot:
    build: .
    env_file:
      - .env
    command: python main.py
    volumes:
      - ./:/app
    restart: unless-stopped

  api:
    build: .
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped
