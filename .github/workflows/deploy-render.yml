name: Deploy To Render

on:
  push:
    branches: [main]

concurrency:
  group: deploy-render-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile check
        run: python -m compileall app main.py

  deploy:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploys selectively
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BOT_SERVICE_ID: ${{ secrets.RENDER_BOT_SERVICE_ID }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
          CHANGED_FILES: ${{ steps.changed.outputs.changed_files }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_BOT_SERVICE_ID:-}" ] || [ -z "${RENDER_API_SERVICE_ID:-}" ]; then
            echo "Render secrets are not configured. Skipping deploy step."
            exit 0
          fi

          if [ -z "${CHANGED_FILES:-}" ]; then
            echo "No changed files detected, skipping deploy."
            exit 0
          fi

          trigger_api_deploy() {
            service_id="$1"
            curl --fail --silent --show-error \
              -X POST "https://api.render.com/v1/services/${service_id}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{}'
          }

          deploy_bot() {
            trigger_api_deploy "${RENDER_BOT_SERVICE_ID}"
          }

          deploy_api() {
            trigger_api_deploy "${RENDER_API_SERVICE_ID}"
          }

          should_deploy_bot=false
          should_deploy_api=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              main.py|app/bot/*|app/ai/*|app/services/*|app/integrations/*|app/database/*|app/utils/*|app/config.py|requirements.txt|requirements-base.txt|requirements-bot.txt|Dockerfile|Dockerfile.bot|render.yaml)
                should_deploy_bot=true
                ;;
            esac
            case "$file" in
              app/main.py|app/ai/*|app/services/*|app/integrations/*|app/database/*|app/utils/*|app/config.py|requirements.txt|requirements-base.txt|requirements-api.txt|Dockerfile|Dockerfile.api|render.yaml)
                should_deploy_api=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$should_deploy_bot" = true ]; then
            deploy_bot
          else
            echo "No bot-impacting files changed; skipping bot deploy."
          fi

          if [ "$should_deploy_api" = true ]; then
            deploy_api
          else
            echo "No api-impacting files changed; skipping api deploy."
          fi
