name: Deploy To Render

on:
  push:
    branches: [main]

concurrency:
  group: deploy-render-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app main.py

  changes:
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bot:
              - 'main.py'
              - 'app/bot/**'
              - 'app/ai/**'
              - 'app/services/**'
              - 'app/integrations/**'
              - 'app/database/**'
              - 'app/utils/**'
              - 'app/config.py'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'render.yaml'
            api:
              - 'app/main.py'
              - 'app/ai/**'
              - 'app/services/**'
              - 'app/integrations/**'
              - 'app/database/**'
              - 'app/utils/**'
              - 'app/config.py'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'render.yaml'

  deploy-bot:
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: needs.changes.outputs.bot == 'true' && secrets.RENDER_API_KEY != '' && secrets.RENDER_BOT_SERVICE_ID != ''
    steps:
      - name: Trigger Render deploy (bot)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BOT_SERVICE_ID: ${{ secrets.RENDER_BOT_SERVICE_ID }}
        run: |
          curl --fail --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_BOT_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

  deploy-api:
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: needs.changes.outputs.api == 'true' && secrets.RENDER_API_KEY != '' && secrets.RENDER_API_SERVICE_ID != ''
    steps:
      - name: Trigger Render deploy (api)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          curl --fail --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
