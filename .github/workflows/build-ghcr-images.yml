name: Build And Push GHCR Images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-ghcr-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: prep
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "bot_img=ghcr.io/${owner_lc}/life-ai-bot" >> "$GITHUB_OUTPUT"
          echo "api_img=ghcr.io/${owner_lc}/life-ai-api" >> "$GITHUB_OUTPUT"

      - name: Detect changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          bot_changed=false
          api_changed=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bot_changed=true
            api_changed=true
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              case "$file" in
                main.py|app/bot/*|app/ai/*|app/services/*|app/integrations/*|app/database/*|app/utils/*|app/config.py|requirements.txt|requirements-base.txt|requirements-bot.txt|Dockerfile|Dockerfile.bot|render.yaml)
                  bot_changed=true
                  ;;
              esac
              case "$file" in
                app/main.py|app/ai/*|app/services/*|app/integrations/*|app/database/*|app/utils/*|app/config.py|requirements.txt|requirements-base.txt|requirements-api.txt|Dockerfile|Dockerfile.api|render.yaml)
                  api_changed=true
                  ;;
              esac
            done <<< "$FILES"
          fi
          echo "bot_changed=$bot_changed" >> "$GITHUB_OUTPUT"
          echo "api_changed=$api_changed" >> "$GITHUB_OUTPUT"

      - name: Build and push bot image
        if: ${{ steps.changed.outputs.bot_changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.prep.outputs.bot_img }}:latest
            ${{ steps.prep.outputs.bot_img }}:${{ github.sha }}
          cache-from: type=gha,scope=life-ai-bot
          cache-to: type=gha,mode=max,scope=life-ai-bot

      - name: Build and push api image
        if: ${{ steps.changed.outputs.api_changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.prep.outputs.api_img }}:latest
            ${{ steps.prep.outputs.api_img }}:${{ github.sha }}
          cache-from: type=gha,scope=life-ai-api
          cache-to: type=gha,mode=max,scope=life-ai-api
