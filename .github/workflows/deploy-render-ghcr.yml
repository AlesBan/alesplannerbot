name: Deploy Render From GHCR

on:
  workflow_run:
    workflows: ["Build And Push GHCR Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR tag to deploy (e.g. commit SHA). Default: latest"
        required: false
        default: "latest"

concurrency:
  group: deploy-render-ghcr-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      RENDER_BOT_DEPLOY_HOOK: ${{ secrets.RENDER_BOT_DEPLOY_HOOK }}
      RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_BOT_SERVICE_ID: ${{ secrets.RENDER_BOT_SERVICE_ID }}
      RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
      RENDER_API_HEALTHCHECK_URL: ${{ secrets.RENDER_API_HEALTHCHECK_URL }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.image_tag }}"
            if [ -z "$tag" ]; then
              tag="latest"
            fi
          else
            tag="${{ github.event.workflow_run.head_sha }}"
            if [ -z "$tag" ]; then
              tag="latest"
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RENDER_BOT_DEPLOY_HOOK:-}" ] || [ -z "${RENDER_API_DEPLOY_HOOK:-}" ]; then
            echo "Missing deploy hook secrets. Set RENDER_BOT_DEPLOY_HOOK and RENDER_API_DEPLOY_HOOK."
            exit 1
          fi

      - name: Trigger bot deploy from GHCR tag
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          bot_img="ghcr.io/${owner_lc}/life-ai-bot:${{ steps.tag.outputs.tag }}"
          encoded_img="$(python -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$bot_img")"
          separator="?"
          if [[ "${RENDER_BOT_DEPLOY_HOOK}" == *\?* ]]; then
            separator="&"
          fi
          hook_url="${RENDER_BOT_DEPLOY_HOOK}${separator}imgURL=${encoded_img}"
          http_code="$(curl --silent --show-error --output /tmp/render_bot_hook_body.txt --write-out '%{http_code}' -X POST "$hook_url" || true)"
          if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
            echo "Bot image-backed deploy hook accepted (${http_code})."
            exit 0
          fi
          echo "Bot deploy hook failed with HTTP ${http_code}; trying API deploy fallback."
          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_BOT_SERVICE_ID:-}" ]; then
            echo "Fallback secrets missing (RENDER_API_KEY/RENDER_BOT_SERVICE_ID)."
            echo "Hook response:"
            cat /tmp/render_bot_hook_body.txt || true
            exit 1
          fi
          curl --fail --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_BOT_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Trigger api deploy from GHCR tag
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          api_img="ghcr.io/${owner_lc}/life-ai-api:${{ steps.tag.outputs.tag }}"
          encoded_img="$(python -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$api_img")"
          separator="?"
          if [[ "${RENDER_API_DEPLOY_HOOK}" == *\?* ]]; then
            separator="&"
          fi
          hook_url="${RENDER_API_DEPLOY_HOOK}${separator}imgURL=${encoded_img}"
          http_code="$(curl --silent --show-error --output /tmp/render_api_hook_body.txt --write-out '%{http_code}' -X POST "$hook_url" || true)"
          if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
            echo "API image-backed deploy hook accepted (${http_code})."
            exit 0
          fi
          echo "API deploy hook failed with HTTP ${http_code}; trying API deploy fallback."
          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_API_SERVICE_ID:-}" ]; then
            echo "Fallback secrets missing (RENDER_API_KEY/RENDER_API_SERVICE_ID)."
            echo "Hook response:"
            cat /tmp/render_api_hook_body.txt || true
            exit 1
          fi
          curl --fail --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Verify API deploy status (best effort)
        if: ${{ env.RENDER_API_KEY != '' && env.RENDER_API_SERVICE_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=24
          sleep_seconds=10
          echo "Polling Render deploy status for API service..."
          for i in $(seq 1 "$max_attempts"); do
            status="$(curl --silent --show-error \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}" | python -c "import sys, json; data=json.load(sys.stdin); print((data.get('service') or {}).get('serviceDetails', {}).get('buildPlan', 'unknown'))")"
            # buildPlan is not full deploy state, but gives quick signal service is reachable.
            echo "Attempt ${i}/${max_attempts}: render service reachable, plan=${status}"
            if [ -n "$status" ] && [ "$status" != "unknown" ]; then
              exit 0
            fi
            sleep "$sleep_seconds"
          done
          echo "Warning: could not verify API deploy status in time."

      - name: Smoke check API health endpoint (best effort)
        if: ${{ env.RENDER_API_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=18
          sleep_seconds=10
          echo "Checking ${RENDER_API_HEALTHCHECK_URL} ..."
          for i in $(seq 1 "$max_attempts"); do
            code="$(curl --silent --output /tmp/health_body.txt --write-out '%{http_code}' "${RENDER_API_HEALTHCHECK_URL}" || true)"
            if [ "$code" = "200" ]; then
              echo "Healthcheck OK."
              exit 0
            fi
            echo "Attempt ${i}/${max_attempts}: healthcheck status=${code}"
            sleep "$sleep_seconds"
          done
          echo "Healthcheck failed."
          cat /tmp/health_body.txt || true
          exit 1
